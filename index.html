<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTR5 · Ropture</title>
    <style>
        /* Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000; /* Fondo negro como punto de partida minimalista */
            color: #ffffff;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;     /* Centra verticalmente */
            align-items: center;         /* Centra horizontalmente */
            text-align: center;
            line-height: 1.6;
        }

        .container {
            max-width: 600px;
            padding: 2rem;
        }

        h1 {
            font-size: clamp(3rem, 15vw, 6rem);  /* Tamaño responsive */
            font-weight: 800;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff, #aaa); /* Efecto sutil */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        .sub {
            font-size: 1.2rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            margin-bottom: 3rem;
            border-bottom: 1px solid #333;
            padding-bottom: 1rem;
            display: inline-block;
        }

        p {
            color: #aaa;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        /* Botón minimalista */
        .btn {
            display: inline-block;
            padding: 0.8rem 2.5rem;
            border: 1px solid #333;
            background: transparent;
            color: #fff;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            border-radius: 0; /* Bordes rectos para look más crudo */
        }

        .btn:hover {
            background: #fff;
            color: #000;
            border-color: #fff;
        }

        /* Footer simple */
        footer {
            position: absolute;
            bottom: 2rem;
            font-size: 0.7rem;
            color: #333;
            letter-spacing: 0.2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Aquí imitamos el título "SKRLXKora" que viste -->
        <h1>DTR5</h1>
        <div class="sub">Ropture</div>
        <p>Ropture<br>Roputre</p>
        <a href="#" class="btn">Explorar</a>
    </div>
    <footer>
        DTR5 · 2026
    </footer>

    <!-- Espacio para agregar interactividad después -->
    <script>
        // Aquí puedes agregar efectos simples si quieres darle más vida
        console.log('Página con estilo SKRLX');
    </script>
</body>
</html>
