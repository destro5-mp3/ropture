<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ropture · minimal</title>
  <style>
    /* —————————————————  fondo silencioso, tipografía limpia  ————————————————— */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f4f5f7;  /* gris casi blanco, sin estridencias */
      font-family: system-ui, -apple-system, 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 1.5rem;      /* respiro en pantallas pequeñas */
    }

    /* tarjeta sutil – sin bordes duros, solo una leve sombra y fondo blanco */
    .reproduce {
      background: #ffffff;
      width: 100%;
      max-width: 760px;      /* suficiente para que el iframe respire, pero no más */
      padding: 1.5rem 1.5rem 1.8rem 1.5rem;
      border-radius: 36px;   /* consistente con el border-radius del iframe */
      box-shadow: 
        0 12px 28px -8px rgba(0, 0, 0, 0.04),
        0 4px 12px rgba(0, 0, 0, 0.02);
      transition: box-shadow 0.2s ease;
    }

    /* el iframe se adapta al ancho de la tarjeta */
    .reproduce iframe {
      display: block;
      width: 100%;
      height: auto;
      min-height: 344px;      /* respeta la altura del embed, pero crece si el contenedor es más ancho (la altura la fija el propio iframe con su contenido) */
      aspect-ratio: 16 / 9;   /* proporción elegante si el embed lo permite, pero mantiene 344px en pantallas angostas gracias al min-height */
      border-radius: 24px;    /* hereda el estilo redondeado del iframe original */
      background: #eceef2;    /* color neutro mientras carga */
      margin: 0 auto;
    }

    /* nombre del proyecto — ropture, con presencia pero sin gritar */
    .title {
      text-align: center;
      margin-bottom: 1.4rem;
      font-weight: 420;       /* weight intermedio, ni bold ni light */
      font-size: 2rem;
      letter-spacing: -0.01em;
      color: #1e1e24;         /* casi negro, con un toque suave */
      line-height: 1.2;
      padding: 0 0.25rem;
    }

    /* un detalle sutil: el nombre también muy tenue en el borde superior */
    .title span {
      display: inline-block;
      background: #eaeef2;
      padding: 0.2rem 1.2rem;
      border-radius: 48px;
      font-size: 1rem;
      font-weight: 390;
      color: #3c3c48;
      letter-spacing: 0.3px;
      margin-top: 0.2rem;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    /* hover casi imperceptible */
    .reproduce:hover {
      box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.06);
    }

    /* adaptación perfecta para móviles */
    @media (max-width: 480px) {
      body {
        padding: 0.8rem;
      }
      .reproduce {
        padding: 1.2rem 1.2rem 1.4rem 1.2rem;
        border-radius: 30px;
      }
      .title {
        font-size: 1.8rem;
        margin-bottom: 1rem;
      }
      .reproduce iframe {
        min-height: 240px;    /* más compacto en móvil, pero conserva la proporción */
        border-radius: 20px;
      }
    }

    /* opcional: hover en el iframe no hace nada, solo estética */
    iframe {
      pointer-events: auto;    /* sigue siendo totalmente interactivo */
    }
  </style>
</head>
<body>

  <main class="reproduce">
    <!-- Título apenas visible: ropture (minimal, sin descripción) -->
    <div class="title">
      ropture
      <span>⏺</span>   <!-- punto apenas perceptible – o puedes usar ·  pero me gusta este detalle mudo -->
    </div>

    <!-- Código exacto que nos diste, sin alterar ni un solo atributo.
         Mantiene width="100%" (heredará el ancho del contenedor),
         height="344" (pero con CSS aseguramos que no deforme)  -->
    <iframe 
      style="border-radius: 24px; display: block; width: 100%; height: auto; min-height: 344px; aspect-ratio: 16 / 9;" 
      src="https://untitled.stream/embed/wKxwrAqiahsB" 
      width="100%" 
      height="344" 
      allowFullScreen="" 
      allow="picture-in-picture" 
      frameborder="0" 
      loading="lazy">
    </iframe>

    <!-- ni un elemento más – solo el embed y el título en su mínima expresión -->
  </main>

  <!-- No hay scripts, no hay nada extra. Pura quietud. -->
</body>
</html>
