<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTR5 · Ropoture</title>
    <style>
        /* Reset y estilos base - Inspirado en SKRLX */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 720px; /* Un poco más ancho para el reproductor */
            width: 100%;
            margin: 0 auto;
        }

        /* Título principal - Estilo SKRLX */
        h1 {
            font-size: clamp(3rem, 15vw, 5rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            line-height: 1.1;
        }

        /* Subtítulo con el nombre del tema */
        .sub {
            font-size: 1.4rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            margin-bottom: 2rem;
            border-bottom: 1px solid #333;
            padding-bottom: 1rem;
            display: inline-block;
        }

        /* Contenedor del reproductor embebido */
        .player-wrapper {
            width: 100%;
            margin: 2.5rem 0;
            border-radius: 24px; /* Coincide con el border-radius del iframe */
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .player-wrapper:hover {
            transform: scale(1.02);
        }

        /* El iframe que te proporcionaron */
        .player-wrapper iframe {
            display: block;
            width: 100%;
            height: 344px; /* Altura fija como en el código original */
            border: none;
            border-radius: 24px;
        }

        /* Botón estilo SKRLX (opcional, por si quieres enlaces) */
        .btn {
            display: inline-block;
            padding: 0.8rem 2.5rem;
            border: 1px solid #333;
            background: transparent;
            color: #fff;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            border-radius: 0;
            margin-top: 1rem;
        }

        .btn:hover {
            background: #fff;
            color: #000;
            border-color: #fff;
        }

        /* Footer minimalista */
        footer {
            margin-top: 3rem;
            font-size: 0.7rem;
            color: #333;
            letter-spacing: 0.2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Título principal - DTR5 como protagonista -->
        <h1>DTR5</h1>
        <div class="sub">Ropoture</div>
        
        <!-- REPRODUCTOR EMBEBIDO - EL CÓDIGO QUE ME DISTE -->
        <div class="player-wrapper">
            <iframe 
                style="border-radius: 24px" 
                src="https://untitled.stream/embed/wKxwrAqiahsB" 
                width="100%" 
                height="344" 
                allowFullScreen="" 
                allow="picture-in-picture" 
                frameborder="0" 
                loading="lazy">
            </iframe>
        </div>

        <!-- Botones opcionales para más opciones -->
        <a href="#" class="btn">Compartir</a>
        <a href="#" class="btn" style="margin-left: 1rem;">Info</a>
    </div>

    <footer>
        DTR5 · 2026
    </footer>

    <!-- Script pequeño para manejar el título dinámico si quieres -->
    <script>
        // Puedes cambiar el título de la pestaña del navegador
        document.title = 'DTR5 · Ropoture';
    </script>
</body>
</html>
